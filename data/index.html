<!DOCTYPE html>
<html>
<head>
    <title>DrawRobot - ECE Defense</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>DrawRobot Control Tower</h1>
        
        <!-- DEFENSE: "Comment visualisez-vous le tracé ?" -->
        <canvas id="map" width="500" height="500"></canvas>
        
        <div class="main-grid">
            <!-- Panel 1: Manual -->
            <div class="panel">
                <h3>Manual Control</h3>
                <div class="d-pad">
                    <button class="up" onmousedown="sendCmd('FORWARD')" onmouseup="sendCmd('STOP')" ontouchstart="sendCmd('FORWARD')" ontouchend="sendCmd('STOP')">FWD<br><small>fwd</small></button>
                    <button class="left" onmousedown="sendCmd('TURN_LEFT')" onmouseup="sendCmd('STOP')" ontouchstart="sendCmd('TURN_LEFT')" ontouchend="sendCmd('STOP')">LFT</button>
                    <button class="right" onmousedown="sendCmd('TURN_RIGHT')" onmouseup="sendCmd('STOP')" ontouchstart="sendCmd('TURN_RIGHT')" ontouchend="sendCmd('STOP')">RGT</button>
                    <button class="down" onmousedown="sendCmd('BACKWARD')" onmouseup="sendCmd('STOP')" ontouchstart="sendCmd('BACKWARD')" ontouchend="sendCmd('STOP')">BWD<br><small>bwd</small></button>
                </div>
                <div class="stats">
                    <p>Pose: <span id="pose">0, 0, 0°</span></p>
                    <p>Batt: <span id="batt">0V</span> | Calib: <span id="calibStatus">N/A</span></p>
                </div>
            </div>

            <!-- Panel 2: Sequences -->
            <div class="panel">
                <h3>Sequences & Shapes</h3>
                <button onclick="sendCmd('stairs')">Séquence 1 (Escalier)</button>
                <div class="input-group">
                    <input type="number" id="squareSize" value="50" placeholder="Size">
                    <input type="number" id="squareCount" value="3" placeholder="Qty">
                    <button onclick="sendSquares()">FA1 (Carrés)</button>
                </div>
                <div class="input-group">
                    <input type="number" id="circleRadius" value="50">
                    <button onclick="sendCircle()">Séquence 2 (Cercle)</button>
                </div>
                <button onclick="sendCmd('north')">Séquence 3 (Nord)</button>
                <button onclick="sendCmd('calibrateMag')">Calibrer Magnétomètre</button>
            </div>

            <!-- Panel 3: Settings -->
            <div class="panel">
                <h3>System Settings</h3>
                <details>
                    <legend>Réglages PID (Expert)</legend>
                    <div class="pid-grid">
                        <span>Linear P/I</span>
                        <input type="number" id="lkp" value="0.5" step="0.1"> 
                        <input type="number" id="lki" value="0.1" step="0.01">
                        <span>Angular P</span>
                        <input type="number" id="akp" value="0.8" step="0.1">
                    </div>
                    <button onclick="sendConfig()">Appliquer PID</button>
                </details>
                <button id="stopBtn" onclick="sendCmd('stop')">EMERGENCY STOP</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
